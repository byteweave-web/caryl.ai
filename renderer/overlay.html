<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: brainimg:; connect-src 'self' https:; font-src 'self' data:;">
<title>Caryl overlay</title>
<style>
/* ============================================================
   TOKENS - a self-contained "glass HUD" palette. Cyan accent to
   read as an ambient instrument sitting on the desktop, not a
   window. Two type roles: Inter for conversation, monospace for
   HUD chrome (status, labels, the calibration readout) - the
   sans/mono pairing is what makes it read as an instrument panel
   rather than a plain chat box.
   ============================================================ */
:root{
  --accent:#7fd1ff;
  --accent-dim:color-mix(in srgb, var(--accent) 16%, transparent);
  --accent-line:color-mix(in srgb, var(--accent) 55%, transparent);
  --confirm:#5ad19a;
  --bad:#e9637b;
  --txt:#f2f6fa; --mut:#9fabb8; --faint:#66727e;
  --void:rgba(7,10,15,.16);          /* the glass tint itself - deliberately slight */
  --edge-hi:rgba(255,255,255,.5);    /* top edge highlight */
  --edge-lo:rgba(255,255,255,.04);   /* bottom edge, near-gone */
  --mono:ui-monospace,'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:transparent;overflow:hidden;
  font-family:var(--sans);-webkit-font-smoothing:antialiased;color:var(--txt)}
button{font-family:inherit;cursor:pointer}
.hidden{display:none !important}

/* ============================================================
   THE 65% HUD - heavy blur + a whisper of tint does the
   readability work; a 1px top-down gradient edge (via a masked
   pseudo-element, not a flat border) gives it a "glass pane"
   structure; a large soft multi-layer shadow lifts it off the
   desktop underneath.
   ============================================================ */
#panel{
  position:fixed;inset:0;display:flex;flex-direction:column;
  background:var(--void);
  -webkit-backdrop-filter:blur(26px) saturate(150%);backdrop-filter:blur(26px) saturate(150%);
  border-radius:3px;overflow:hidden;
  /* Corners are sharp ON PURPOSE, not a bug we couldn't fix: a HUD reads as an instrument,
     not a soft app window, and the corner brackets below make that a deliberate signature
     rather than an accident. */
  box-shadow:
    0 30px 100px -24px rgba(0,0,0,.65),
    0 10px 34px -12px rgba(0,0,0,.5),
    0 46px 130px -30px rgba(127,209,255,.07);
  transition:box-shadow .25s ease;
}
/* Windows 10: DWM acrylic doesn't exist, so a transparent panel would show raw desktop
   through a tint. Same palette, fully solid, no backdrop-filter. */
html[data-os="win10"] #panel{
  background:#10141c;
  -webkit-backdrop-filter:none;backdrop-filter:none;
}
#panel::before{ /* the razor-thin gradient edge */
  content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;
  background:linear-gradient(180deg, var(--edge-hi), var(--edge-lo) 55%, var(--edge-lo));
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
}
#panel.dragging{ box-shadow:
    0 30px 100px -24px rgba(0,0,0,.65),
    0 0 0 1px var(--accent-line) inset,
    0 0 70px 4px rgba(127,209,255,.22);
}
/* Targeting-bracket corners - the signature that turns "sharp edges" into a chosen look. */
.hud-corner{position:absolute;width:16px;height:16px;pointer-events:none;opacity:.5;transition:opacity .2s ease;z-index:2}
.hud-corner.tl{top:9px;left:9px;border-top:1.5px solid var(--accent);border-left:1.5px solid var(--accent)}
.hud-corner.tr{top:9px;right:9px;border-top:1.5px solid var(--accent);border-right:1.5px solid var(--accent)}
.hud-corner.bl{bottom:9px;left:9px;border-bottom:1.5px solid var(--accent);border-left:1.5px solid var(--accent)}
.hud-corner.br{bottom:9px;right:9px;border-bottom:1.5px solid var(--accent);border-right:1.5px solid var(--accent)}
#panel.dragging .hud-corner{opacity:.95}

.bar{position:relative;display:flex;align-items:center;gap:10px;padding:13px 16px;
  border-bottom:1px solid rgba(255,255,255,.07);-webkit-app-region:drag}
.bar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);flex:none;
  animation:breathe-dot 2.6s ease-in-out infinite}
@keyframes breathe-dot{0%,100%{opacity:1}50%{opacity:.45}}
.bar .title{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.bar .state{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);
  border:1px solid rgba(255,255,255,.10);border-radius:99px;padding:3px 9px;margin-left:2px}
.bar .grow{flex:1}
.bar .icon-btn{-webkit-app-region:no-drag;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);color:var(--mut);
  width:28px;height:28px;border-radius:9px;display:grid;place-items:center;line-height:1;transition:background .15s,color .15s}
.bar .icon-btn:hover{background:rgba(255,255,255,.09);color:var(--txt)}
.bar .icon-btn.on{color:var(--accent);border-color:var(--accent-line);background:var(--accent-dim)}

/* ---------- conversation ---------- */
.body{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:12px;position:relative}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}
.you{align-self:flex-end;max-width:85%;background:var(--accent-dim);border:1px solid rgba(127,209,255,.22);
  padding:9px 13px;border-radius:13px;font-size:14px;line-height:1.5;white-space:pre-wrap}
.brain{align-self:flex-start;max-width:92%;font-size:15px;line-height:1.6;white-space:pre-wrap}
.brain .label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.sys{align-self:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--faint);
  text-align:center;padding:2px 4px}
.empty{margin:auto;text-align:center;color:var(--faint);font-size:13px;line-height:1.7;max-width:280px}

/* ---------- drop-hint: appears only while a real OS drag is over the HUD ---------- */
.dropzone{
  position:absolute;inset:12px;border-radius:3px;z-index:5;pointer-events:none;
  border:1.5px dashed var(--accent-line);background:rgba(127,209,255,.05);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  opacity:0;transform:scale(.98);transition:opacity .16s ease,transform .16s ease;
}
#panel.dragging .dropzone{opacity:1;transform:scale(1)}
.dropzone svg{opacity:.85}
.dropzone .dz-label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}

.composer{display:flex;gap:9px;padding:12px 14px;border-top:1px solid rgba(255,255,255,.07)}
.composer input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);color:var(--txt);
  border-radius:12px;padding:11px 14px;font-size:14px;outline:none;transition:border-color .15s}
.composer input:focus{border-color:var(--accent-line)}
.composer button{border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:0 15px;font-size:13px;font-weight:600;
  background:rgba(255,255,255,.05);color:var(--txt);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:background .15s}
.composer button:hover{background:rgba(255,255,255,.11)}
.composer .send{background:var(--accent);color:#06121b;border-color:transparent}
#imp-status{font-family:var(--mono);font-size:11px;color:var(--mut);padding:0 16px 10px;min-height:14px;letter-spacing:.02em}
#imp-status.bad{color:var(--bad)} #imp-status.ok{color:var(--confirm)}

/* ============================================================
   CALIBRATION - "name your assistant". Replaces the body while
   open. Input -> spinner (real save happening) -> green ripple
   + a genuine spoken confirmation from Caryl itself.
   ============================================================ */
.calib{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center}
.calib .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
.calib h2{margin:0;font-size:16px;font-weight:600;color:var(--txt);max-width:260px;line-height:1.4}
.calib-row{display:flex;gap:8px;width:100%;max-width:280px}
.calib-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--txt);
  border-radius:11px;padding:11px 13px;font-size:14px;text-align:center;outline:none;transition:border-color .15s}
.calib-row input:focus{border-color:var(--accent-line)}
.calib-row button{border:none;border-radius:11px;padding:0 16px;font-size:13px;font-weight:700;background:var(--accent);color:#06121b}
.calib-status{font-family:var(--mono);font-size:11px;color:var(--mut);min-height:14px}
.calib-status.bad{color:var(--bad)}

.ring-wrap{width:40px;height:40px;display:grid;place-items:center}
.spinner{width:32px;height:32px;border-radius:50%;background:conic-gradient(from 0deg,transparent,var(--accent));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
  animation:spin .85s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ripple{width:32px;height:32px;border-radius:50%;border:2px solid var(--confirm);animation:ripple-out .9s ease-out forwards}
@keyframes ripple-out{0%{transform:scale(.3);opacity:1;box-shadow:0 0 0 0 rgba(90,209,154,.5)}100%{transform:scale(1.7);opacity:0;box-shadow:0 0 0 18px rgba(90,209,154,0)}}
.calib-confirm{color:var(--confirm);font-size:14px;line-height:1.5;max-width:260px}
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

  <!-- Expanded HUD (the collapsed bubble now lives entirely in mini-overlay.html - its own
       window, its own file, so it never inherits this panel's backdrop-filter blur) -->
  <div id="panel">
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>
    <div class="bar">
      <span class="dot"></span>
      <span class="title" id="title">Caryl</span>
      <span class="state" id="state">idle</span>
      <span class="grow"></span>
      <button class="icon-btn" id="btn-name" title="Name your assistant">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><circle cx="9" cy="10.2" r="1.8"/><path d="M14.2 9h3.3M14.2 13h3.3M6 16.3c.5-1.7 1.8-2.6 3-2.6s2.5.9 3 2.6"/></svg>
      </button>
      <button class="icon-btn" id="btn-bubble" title="Shrink to bubble">&#9472;</button>
      <button class="icon-btn" id="btn-hide" title="Hide overlay">&#10005;</button>
    </div>

    <div class="body" id="body">
      <div class="empty" id="empty">Ask me something, or drop a document anywhere on this pane to summarize it.<br><br>Click outside this window to shrink it to a bubble.</div>
    </div>

    <!-- Drop-hint: a direct child of #panel (not .body), so it renders regardless of which
         view (conversation or calibration) is currently showing. -->
    <div class="dropzone" id="dropzone">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a2 2 0 002 2h12a2 2 0 002-2v-3"/></svg>
      <span class="dz-label">Drop to ingest</span>
    </div>

    <!-- Calibration: name-your-assistant flow -->
    <div class="calib hidden" id="calib">
      <div class="eyebrow">Identity</div>
      <h2 id="calib-h">What would you like to call your assistant?</h2>
      <div class="calib-row" id="calib-form">
        <input id="calib-input" placeholder="Jarvis" maxlength="40" autocomplete="off" spellcheck="false">
        <button id="calib-set">Set</button>
      </div>
      <div class="ring-wrap hidden" id="calib-ring"><div class="spinner"></div></div>
      <div class="ring-wrap hidden" id="calib-ripple"><div class="ripple"></div></div>
      <div class="calib-confirm hidden" id="calib-confirm"></div>
      <div class="calib-status" id="calib-status"></div>
    </div>

    <div id="imp-status"></div>

    <div id="auto-runbar" style="display:none;align-items:center;gap:9px;padding:8px 14px;background:rgba(224,177,90,.10);border-top:1px solid rgba(224,177,90,.25);font-size:12px">
      <span style="width:7px;height:7px;border-radius:50%;background:#e0b15a;flex:none;animation:breathe-dot 1.4s infinite"></span>
      <span style="flex:1">Automation running&hellip;</span>
      <button onclick="window.bridge.automationStop && window.bridge.automationStop()" style="background:var(--bad);border:none;color:#fff;border-radius:8px;padding:6px 12px;font:inherit;font-size:11.5px;cursor:pointer">Stop</button>
    </div>

    <div class="composer" id="composer">
      <input id="inp" placeholder="Message&hellip;" autocomplete="off" spellcheck="false">
      <button class="imp" id="btn-import" title="Import a document">&#128206; Import</button>
      <button class="send" id="btn-send">Send</button>
    </div>
  </div>

<script>
// OS-aware treatment: Win11 keeps blur, Win10 gets solid CSS (fail solid, never transparent).
window.bridge.getShellStyle().then(function (s) {
  document.documentElement.dataset.os = (s && s.osVariant) || 'win10';
}).catch(function () { document.documentElement.dataset.os = 'win10'; });
(function(){
  if (window.__overlayBootstrapped) {
    console.warn('[overlay] bootstrap already ran, skipping duplicate initialization');
    return;
  }
  window.__overlayBootstrapped = true;

  // Theme defaults before the first status poll lands (theme.css :root covers pre-JS paint).
  document.documentElement.dataset.theme = document.documentElement.dataset.theme || 'cyanHud';
  document.documentElement.dataset.accent = document.documentElement.dataset.accent || 'cyan';

  const $ = (id) => document.getElementById(id);
  const bridge = window.bridge || {};
// TEMPORARY diagnostic - tells us immediately whether the bridge loaded and which methods it
// actually has. If this logs "NO window.bridge at all" or a short method list missing things
// like overlayActivity/setAssistantName, the preload.js on disk is stale/incomplete.
console.log('[overlay] window.bridge exists:', !!window.bridge);
console.log('[overlay] bridge methods:', window.bridge ? Object.keys(window.bridge).sort() : '(none - bridge is missing entirely)');

// ---------- panel controls ----------
try{
  $('btn-bubble').onclick = function(){ if(bridge.overlayCollapse) bridge.overlayCollapse(); };
  $('btn-hide').onclick   = function(){ if(bridge.overlayHide) bridge.overlayHide(); };
  setTimeout(function(){ try{ $('inp').focus(); }catch(e){} }, 30);
}catch(e){ console.error('[overlay] panel controls setup FAILED:', e); }

// ---------- send a message ----------
function send(){
  const t = $('inp').value.trim();
  if(!t){ return; }
  if(!bridge.sendText){ console.warn('[overlay] bridge.sendText is missing - cannot send. Stale preload.js?'); return; }
  $('inp').value='';
  bridge.sendText(t);
}
try{
  $('btn-send').onclick = send;
  $('inp').addEventListener('keydown', function(e){ if(e.key==='Enter') send(); });
}catch(e){ console.error('[overlay] send-box wiring FAILED:', e); }

// ---------- import via dialog button ----------
function showImportStatus(r){
  const st = $('imp-status');
  if(r && r.ok){ st.textContent = '\u2713 Imported '+(r.name||'document')+' \u2014 summarizing\u2026'; st.className='ok'; }
  else if(r && r.canceled){ st.textContent=''; st.className=''; }
  else { st.textContent = '\u26A0 '+((r&&r.error)||'Could not import that file.'); st.className='bad'; }
  setTimeout(function(){ if(st.className==='ok'){ st.textContent=''; st.className=''; } }, 5000);
}
try{
  $('btn-import').onclick = async function(){
    const st = $('imp-status');
    if(!bridge.importDoc){ st.textContent='\u26A0 Import unavailable - stale preload.js?'; st.className='bad'; return; }
    st.textContent = 'Choose a document\u2026'; st.className='';
    try{ showImportStatus(await bridge.importDoc()); }
    catch(e){ st.textContent = '\u26A0 '+(e&&e.message?e.message:e); st.className='bad'; }
  };
}catch(e){ console.error('[overlay] import-button wiring FAILED:', e); }

// ---------- drag-and-drop straight onto the glass pane ----------
try{
  let depth = 0;
  function isFileDrag(e){ return e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types||[], 'Files') !== -1; }
  document.addEventListener('dragenter', function(e){
    if(!isFileDrag(e)) return;
    e.preventDefault(); depth++;
    $('panel').classList.add('dragging');
  });
  document.addEventListener('dragover', function(e){ if(isFileDrag(e)) e.preventDefault(); }); // required to allow drop
  document.addEventListener('dragleave', function(e){
    if(!isFileDrag(e)) return;
    depth = Math.max(0, depth-1);
    if(depth===0){ $('panel').classList.remove('dragging'); }
  });
  document.addEventListener('drop', async function(e){
    if(!isFileDrag(e)) return;
    e.preventDefault();
    depth = 0;
    $('panel').classList.remove('dragging');
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if(!file || !bridge.getPathForFile || !bridge.importDocPath) return;
    const st = $('imp-status');
    st.textContent = 'Reading '+file.name+'\u2026'; st.className='';
    try{
      const p = bridge.getPathForFile(file);
      if(!p){ st.textContent='\u26A0 Could not read that file\u2019s location.'; st.className='bad'; return; }
      showImportStatus(await bridge.importDocPath(p));
    }catch(err){ st.textContent = '\u26A0 '+(err&&err.message?err.message:err); st.className='bad'; }
  });
}catch(e){ console.error('[overlay] drag-and-drop setup FAILED:', e); }

// ---------- calibration: name your assistant ----------
try{
  let open=false;
  function showCalib(on){
    open=on;
    $('calib').classList.toggle('hidden', !on);
    $('body').classList.toggle('hidden', on);
    $('composer').classList.toggle('hidden', on);
    $('imp-status').classList.toggle('hidden', on);
    $('btn-name').classList.toggle('on', on);
    if(on){
      $('calib-form').classList.remove('hidden');
      $('calib-ring').classList.add('hidden');
      $('calib-ripple').classList.add('hidden');
      $('calib-confirm').classList.add('hidden');
      $('calib-status').textContent='';
      const inp=$('calib-input'); inp.value=''; setTimeout(function(){ inp.focus(); }, 30);
    }
  }
  $('btn-name').onclick = function(){ showCalib(!open); };

  async function submitName(){
    const name = $('calib-input').value.trim();
    if(!name){ $('calib-status').textContent='Enter a name first.'; $('calib-status').className='calib-status bad'; return; }
    if(!bridge.setAssistantName){ $('calib-status').textContent='\u26A0 Unavailable - stale preload.js?'; $('calib-status').className='calib-status bad'; return; }
    $('calib-status').textContent='';
    $('calib-form').classList.add('hidden');
    $('calib-ring').classList.remove('hidden');
    const started = Date.now();
    let res;
    try{ res = await bridge.setAssistantName(name); }
    catch(e){ res = { ok:false, error:(e&&e.message)||String(e) }; }
    const elapsed = Date.now()-started;
    if(elapsed < 700) await new Promise(function(r){ setTimeout(r, 700-elapsed); }); // let the spinner read as real work, not a flicker
    $('calib-ring').classList.add('hidden');
    if(res && res.ok){
      $('title').textContent = res.name;
      $('calib-ripple').classList.remove('hidden');
      $('calib-confirm').textContent = 'Got it \u2014 I\u2019ll go by \u201C'+res.name+'\u201D from now on.';
      $('calib-confirm').classList.remove('hidden');
      setTimeout(function(){ showCalib(false); }, 2400);
    }else{
      $('calib-form').classList.remove('hidden');
      $('calib-status').textContent='\u26A0 '+((res&&res.error)||'Could not save that.');
      $('calib-status').className='calib-status bad';
    }
  }
  $('calib-set').onclick = submitName;
  $('calib-input').addEventListener('keydown', function(e){ if(e.key==='Enter') submitName(); });
}catch(e){ console.error('[overlay] calibration setup FAILED:', e); }

// ---------- poll status + conversation, mirror the FULL thread from the main window ----------
function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let lastSig = '', lastName = '';
function renderActs(acts){
  const body=$('body');
  if(!acts.length){ body.innerHTML='<div class="empty" id="empty">Ask me something, or drop a document anywhere on this pane to summarize it.<br><br>Click outside this window to shrink it to a bubble.</div>'; return; }
  const nearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 120;
  const html = acts.map(function(a){
    if(a.kind==='heard') return '<div class="you">'+esc(a.text)+'</div>';
    if(a.kind==='said')  return '<div class="brain"><span class="label">'+esc(lastName||'Caryl')+'</span>'+esc(a.text || '\u2026')+'</div>';
    if(a.kind==='action') return '<div class="sys">'+esc(a.text)+'</div>';
    if(a.kind==='automation_plan'){
      let h='<div class="brain"><div style="margin-bottom:7px">Plan for: <b>'+esc(a.goal)+'</b></div><ol style="margin:0 0 10px 18px;padding:0;font-size:13px;line-height:1.6">';
      h+=(a.steps||[]).map(function(s){ return '<li>'+esc(s)+'</li>'; }).join('');
      h+='</ol><div style="display:flex;gap:8px"><button onclick="window.bridge.automationApprovePlan(\''+a.id+'\')" style="background:var(--accent);border:none;color:#06121b;font-weight:700;border-radius:8px;padding:7px 14px;font:inherit;font-size:12px;cursor:pointer">Go ahead</button><button onclick="window.bridge.automationCancelPlan(\''+a.id+'\')" style="background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 14px;font:inherit;font-size:12px;cursor:pointer">Cancel</button></div></div>';
      return h;
    }
    if(a.kind==='automation_confirm'){
      return '<div class="brain" style="border:1px solid rgba(233,99,123,.4);border-radius:8px;padding:10px"><div style="margin-bottom:7px;color:var(--bad);font-size:10.5px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase">Confirm this action</div><div style="font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.05);border-radius:6px;padding:8px 10px;margin-bottom:9px;overflow-x:auto;white-space:pre">'+esc(a.cmd)+'</div><div style="display:flex;gap:8px"><button onclick="window.bridge.automationConfirmShell(\''+a.id+'\',true)" style="background:var(--bad);border:none;color:#fff;font-weight:700;border-radius:8px;padding:7px 14px;font:inherit;font-size:12px;cursor:pointer">Confirm</button><button onclick="window.bridge.automationConfirmShell(\''+a.id+'\',false)" style="background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 14px;font:inherit;font-size:12px;cursor:pointer">Cancel</button></div></div>';
    }
    if(a.kind==='automation_pick'){
      var opts=(a.candidates||[]).map(function(c){return '<button onclick="window.bridge.automationPick(\''+a.id+'\','+c.id+')" style="display:block;width:100%;text-align:left;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 11px;margin:4px 0;font:inherit;font-size:12px;cursor:pointer">'+esc(c.name)+' ('+esc(String(c.type).replace('Control',''))+')</button>';}).join('');
      return '<div class="brain" style="border:1px solid rgba(127,209,255,.4);border-radius:8px;padding:10px"><div style="margin-bottom:7px;color:var(--accent);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase">Which one?</div><div style="font-size:12px;margin-bottom:7px">Looking for: <b>'+esc(a.wanted)+'</b></div>'+opts+'<div style="display:flex;gap:8px;margin-top:6px"><button onclick="window.bridge.automationPick(\''+a.id+'\',\'skip\')" style="background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer">Skip</button><button onclick="window.bridge.automationPick(\''+a.id+'\',\'stop\')" style="background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer">Stop</button></div></div>';
    }
    if(a.kind==='image') return '<div class="sys">\uD83D\uDDBC\uFE0F '+esc(a.text||'Image generated')+'</div>';
    if(a.kind==='model3d') return '<div class="sys">\uD83E\uDD0A 3D model: '+esc(a.name||'model')+'</div>';
    return '';
  }).join('');
  body.innerHTML = html;
  if(nearBottom) body.scrollTop = body.scrollHeight;
}
async function refresh(){
  try{
    const s = await bridge.status();
    if(s){
      let label='idle';
      if(s.ai_status==='thinking'){ label='thinking'; }
      else if(s.ai_status==='working'||s.ai_status==='researching'){ label='working\u2026'; }
      $('state').textContent = label;
      const nm = s.assistant_name || 'Caryl';
      if(nm!==lastName){ lastName=nm; $('title').textContent=nm; lastSig=''; } // name changed -> force a re-render so labels update too
      // Theme + accent ride the status poll so a Settings change restyles the open overlay live.
      if (s.theme && document.documentElement.dataset.theme !== s.theme) document.documentElement.dataset.theme = s.theme;
      if (s.accent && document.documentElement.dataset.accent !== s.accent) document.documentElement.dataset.accent = s.accent;
      const rb=$('auto-runbar');
      if(rb) rb.style.display = s.automation_running ? 'flex' : 'none';
    }
  }catch(e){ console.error('[overlay] bridge.status() FAILED:', e); }

  try{
    if(!bridge.overlayActivity){ console.warn('[overlay] bridge.overlayActivity is missing - stale preload.js?'); return; }
    const d = await bridge.overlayActivity();
    const acts = (d && d.activity) || [];
    const sig = JSON.stringify(acts.map(function(a){ return [a.kind, a.text]; }));
    if(sig===lastSig) return;
    lastSig=sig;
    renderActs(acts);
  }catch(e){ console.error('[overlay] bridge.overlayActivity() FAILED:', e); }
}
  setInterval(refresh, 220);
  refresh();
})();
</script>
