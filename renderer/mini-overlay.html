<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: brainimg:; connect-src 'self' https:; font-src 'self' data:;">
<title>Caryl bubble</title>
<style>
/* ============================================================
   THE THUMB-BUBBLE - its own window, its own file, on purpose.
   Sharing the panel's window meant inheriting its backdrop-filter
   blur, which on a near-empty 92px window renders as a murky
   smudge instead of a crisp orb. Hard rule below: NO
   backdrop-filter, anywhere, ever. Regular filter:blur()/
   drop-shadow() are a different, safe operation (they operate on
   this element's own already-painted content, never sample what's
   behind the window) and are used freely. Same for alpha: any
   translucent color you see below is blended against an opaque
   base painted by THIS element, never against the real desktop.

   V4 - SIX FULL THEMES, ONE PER ACCENT SWATCH (see ACCENTS in
   index.html), each a genuinely different structure, not a
   recolor: Mono is a morphing liquid-chrome blob that snaps to a
   circle with a gyroscope ring on hover; Ice is a faceted-ice
   panel with concentric tech rings, scanlines, and a ping pulse
   on hover; Mint is an organic morphing cell that buds three
   orbiting sub-dots on hover; Amber is a vacuum-tube core with a
   flickering SVG filament that steadies on hover; Rose is a deep,
   asymmetric 8-facet crystal (richer/darker than a toy gem on
   purpose - the earlier all-cyan faceted version read as
   childish, this is deliberately less symmetric and less pastel);
   Violet is a void core (dark CENTER fading out to violet, the
   only palette that inverts the usual light-center convention)
   with its own inner accretion-disk ring, independent of the
   status ring around it.

   Two things called for in the brief are intentionally NOT here,
   both for the same reason: clicking already triggers an instant
   panel-expand (see mouseup below), so a multi-second "crack
   open" / "cell division" / "unfold into a menu" / "implosion"
   sequence on click would either get cut off mid-animation or
   force the app to feel slower just to finish playing. What IS
   here: a real HOVER reaction per theme (hovering doesn't trigger
   navigation, so it's safe to be elaborate there), and Ice's
   "glassmorphism" is a layered opaque gradient standing in for
   backdrop-blur, not literal backdrop-blur, for the reason above.

   Structure: one hidden .core-X block per theme, all present at
   all times but display:none except the one matching
   data-palette - CSS animations don't run on display:none
   elements, so the five you're not using cost nothing. Same
   pattern for mono's 3D ring. The status ring (ring-track/
   ring-sweep) and the letter mark are unchanged and shared by
   every theme - one is the constant status language, the other
   just needs to stay legible; neither needed to change per-theme.
   ============================================================ */
:root{
  --accent:#7fd1ff;
  --confirm:#5ad19a;
  --mono:ui-monospace,'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:transparent;overflow:hidden;-webkit-font-smoothing:antialiased}

#bubble{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  --pulse:3.4s;--sweep:6s;--glow:.5;--ink:var(--accent);
}
#bubble[data-state="thinking"]{--pulse:2s;--sweep:2.4s;--glow:.75}
#bubble[data-state="working"]{--pulse:1.3s;--sweep:1.1s;--glow:.92}
#bubble.dragging{--ink:var(--confirm);--glow:.9}
#bubble[data-palette="mono"]  {--ink:#e7e9ee}
#bubble[data-palette="ice"]   {--ink:#7fd1ff}
#bubble[data-palette="mint"]  {--ink:#5ad19a}
#bubble[data-palette="amber"] {--ink:#e0b15a}
#bubble[data-palette="rose"]  {--ink:#e9637b}
#bubble[data-palette="violet"]{--ink:#b08cff}

.orb-wrap{position:relative;width:66px;height:66px;transition:transform .15s ease;perspective:220px}
.orb-wrap:hover{--glow:.9;--sweep:2.2s;transform:scale(1.045)}
#bubble.grabbing .orb-wrap{transform:scale(.94)}

.ring-track{position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(255,255,255,.14);pointer-events:none}
.ring-sweep{
  position:absolute;inset:-5px;border-radius:50%;pointer-events:none;
  background:conic-gradient(from 0deg, transparent 0 62%, var(--ink) 100%);
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
  opacity:var(--glow);
  filter:drop-shadow(0 0 3px var(--ink));
  animation:sweep var(--sweep) linear infinite;
  transition:opacity .3s ease;
}
@keyframes sweep{to{transform:rotate(360deg)}}

.orb{position:absolute;inset:0;border-radius:50%;overflow:hidden;isolation:isolate;cursor:grab;user-select:none}
#bubble.grabbing .orb{cursor:grabbing}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.055)}}

.core{display:none;position:absolute;inset:0}
#bubble[data-palette="mono"]   .core-mono  ,
#bubble[data-palette="ice"]    .core-ice   ,
#bubble[data-palette="mint"]   .core-mint  ,
#bubble[data-palette="amber"]  .core-amber ,
#bubble[data-palette="rose"]   .core-rose  ,
#bubble[data-palette="violet"] .core-violet{display:block}
#bubble:not([data-palette]) .core-default{display:block}

/* fallback for any accent outside the 6 presets, so it's never unstyled */
.default-fill{position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 30% 24%, color-mix(in srgb, var(--ink) 30%, white), var(--ink) 55%, color-mix(in srgb, var(--ink) 55%, black) 100%);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.4), inset 0 -8px 16px rgba(0,0,0,.3);
  animation:breathe var(--pulse) ease-in-out infinite}

/* ---------- 1. MONO - "Liquid Chrome Monolith" ---------- */
.mono-blob{
  position:absolute;inset:0;
  background:radial-gradient(circle at 32% 26%, #ffffff 0%, #e4e7ec 22%, #b7bfc9 46%, #6b7480 72%, #2b2f36 100%);
  border-radius:58% 42% 55% 45% / 55% 45% 62% 38%;
  box-shadow:inset 0 2px 3px rgba(255,255,255,.65), inset 0 -8px 14px rgba(0,0,0,.4);
  animation:mono-morph 7s ease-in-out infinite, breathe var(--pulse) ease-in-out infinite;
  transition:border-radius .4s ease;
}
@keyframes mono-morph{
  0%,100%{border-radius:58% 42% 55% 45% / 55% 45% 62% 38%}
  33%{border-radius:45% 55% 48% 52% / 40% 62% 38% 60%}
  66%{border-radius:52% 48% 62% 38% / 58% 42% 48% 52%}
}
.orb-wrap:hover .mono-blob{border-radius:50%} /* sharply snaps to a perfect circle */

.mono-ring3d{display:none;position:absolute;inset:-13px;border-radius:50%;pointer-events:none;
  border:2px solid rgba(255,255,255,.9);opacity:0;transform:scale(.85);
  transition:opacity .25s ease, transform .25s ease}
#bubble[data-palette="mono"] .mono-ring3d{display:block}
.mono-ring3d::after{content:'';position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(255,255,255,.55)}
.orb-wrap:hover .mono-ring3d{opacity:1;transform:scale(1);animation:mono-gyro 1.8s linear infinite}
@keyframes mono-gyro{to{transform:scale(1) rotateY(360deg)}}

/* ---------- 2. ICE - "Glacial Hologram" (opaque gradient standing in for backdrop-blur) ---------- */
.ice-base{position:absolute;inset:0;
  background:radial-gradient(circle at 30% 24%, #eafcff 0%, #b8e6ff 24%, #5fa8e0 55%, #1c3f66 82%, #0a1c30 100%);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.5), inset 0 -8px 14px rgba(0,10,25,.4);
  animation:breathe var(--pulse) ease-in-out infinite;
}
.ice-rings{position:absolute;inset:9%;border-radius:50%;pointer-events:none;
  background:repeating-radial-gradient(circle, transparent 0 4px, rgba(220,248,255,.4) 4px 5px);
  animation:ice-pulse 3.2s ease-in-out infinite;
}
@keyframes ice-pulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.85;transform:scale(1.06)}}
.ice-scan{position:absolute;inset:0;border-radius:50%;overflow:hidden;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(255,255,255,.14) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;opacity:.55;
}
.ice-ping{position:absolute;inset:-6px;border-radius:50%;pointer-events:none;
  border:1.5px solid rgba(210,245,255,.9);opacity:0;
}
.orb-wrap:hover .ice-ping{animation:ice-ping-anim 1.1s ease-out infinite}
@keyframes ice-ping-anim{0%{opacity:.9;transform:scale(.82)}100%{opacity:0;transform:scale(1.55)}}

/* ---------- 3. MINT - "Bio-Dynamic Synth-Cell" ---------- */
.mint-cell{position:absolute;inset:0;
  background:radial-gradient(circle at 40% 35%, #d6ffe9 0%, #7ee8b0 22%, #3fbf82 50%, #1a6b45 78%, #0a3320 100%);
  border-radius:52% 48% 58% 42% / 48% 58% 42% 52%;
  box-shadow:inset 0 0 14px rgba(230,255,240,.4), inset 0 -8px 16px rgba(0,40,20,.4);
  animation:mint-morph 6s ease-in-out infinite, breathe var(--pulse) ease-in-out infinite;
}
@keyframes mint-morph{0%,100%{border-radius:52% 48% 58% 42% / 48% 58% 42% 52%}50%{border-radius:44% 56% 46% 54% / 58% 42% 56% 44%}}
.mint-buds{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s ease}
.orb-wrap:hover .mint-buds{opacity:1}
.mint-buds span{position:absolute;width:9px;height:9px;border-radius:50%;top:50%;left:50%;margin:-4.5px;
  background:radial-gradient(circle at 35% 30%, #d6ffe9, #3fbf82 70%);
}
.orb-wrap:hover .mint-buds .b1{animation:bud-orbit1 2.4s linear infinite}
.orb-wrap:hover .mint-buds .b2{animation:bud-orbit2 2.8s linear infinite}
.orb-wrap:hover .mint-buds .b3{animation:bud-orbit3 3.2s linear infinite}
@keyframes bud-orbit1{from{transform:rotate(0deg) translateX(26px) rotate(0deg)}to{transform:rotate(360deg) translateX(26px) rotate(-360deg)}}
@keyframes bud-orbit2{from{transform:rotate(120deg) translateX(24px) rotate(-120deg)}to{transform:rotate(480deg) translateX(24px) rotate(-480deg)}}
@keyframes bud-orbit3{from{transform:rotate(240deg) translateX(28px) rotate(-240deg)}to{transform:rotate(600deg) translateX(28px) rotate(-600deg)}}

/* ---------- 4. AMBER - "Plasma Forge" ---------- */
.amber-glass{position:absolute;inset:0;
  background:radial-gradient(circle at 50% 55%, #3a1c05 0%, #6e2d06 40%, #b0470a 68%, #3a1503 100%);
  box-shadow:inset 0 0 14px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,200,140,.3);
  animation:breathe var(--pulse) ease-in-out infinite;
}
.amber-filament{position:absolute;inset:9%;pointer-events:none;
  filter:drop-shadow(0 0 4px #ffb347) drop-shadow(0 0 9px #ff8a1f);
  opacity:.8;animation:filament-flicker 2.6s steps(1) infinite;
}
@keyframes filament-flicker{
  0%,100%{opacity:.72;transform:scale(1)}
  18%{opacity:.97;transform:scale(1.03) rotate(1deg)}
  34%{opacity:.5;transform:scale(.98)}
  47%{opacity:.92;transform:scale(1.04) rotate(-1deg)}
  62%{opacity:.62;transform:scale(1)}
  81%{opacity:.94;transform:scale(1.01)}
}
.orb-wrap:hover .amber-filament{animation:filament-steady 1.2s ease-in-out infinite;opacity:1}
@keyframes filament-steady{0%,100%{filter:drop-shadow(0 0 5px #fff5d0) drop-shadow(0 0 12px #ffb347)}50%{filter:drop-shadow(0 0 7px #fff5d0) drop-shadow(0 0 17px #ffb347)}}

/* ---------- 5. ROSE - "Kinetic Cyber-Quartz" (asymmetric + deep-toned on purpose, not a toy gem) ---------- */
.rose-facets{position:absolute;inset:0;
  background:conic-gradient(from 15deg,
    #f2a6b8 0deg 45deg, #c73866 45deg 90deg, #7a1c3e 90deg 135deg, #a02850 135deg 180deg,
    #e9637b 180deg 225deg, #5c1230 225deg 270deg, #d6547a 270deg 315deg, #8f2248 315deg 360deg);
  box-shadow:inset 0 2px 3px rgba(255,220,230,.5), inset 0 -10px 16px rgba(20,0,10,.5);
  animation:rose-spin 18s linear infinite, breathe var(--pulse) ease-in-out infinite;
}
@keyframes rose-spin{to{transform:rotate(360deg)}}
.orb-wrap:hover .rose-facets{animation-duration:4s, var(--pulse)}

/* ---------- 6. VIOLET - "Singularity Void" (dark CENTER, the one palette that inverts the usual light-center look) ---------- */
.violet-void{position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%, #05030a 0%, #05030a 30%, #2a1050 55%, #6a3ad1 78%, #b08cff 100%);
  animation:breathe var(--pulse) ease-in-out infinite;
}
.violet-disk{position:absolute;inset:10%;border-radius:50%;pointer-events:none;
  background:conic-gradient(from 0deg, transparent 0 60%, #b08cff 78%, #e8d8ff 88%, transparent 100%);
  -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px));
  mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px));
  filter:drop-shadow(0 0 5px #b08cff);
  animation:violet-disk-spin 5s linear infinite;
}
@keyframes violet-disk-spin{to{transform:rotate(360deg)}}
.orb-wrap:hover .violet-disk{animation-duration:1.6s}
.orb-wrap:hover .violet-void{animation-duration:calc(var(--pulse) * .5)}

/* Separate sibling overlaying every core (not a child of any of them), so it never inherits
   any theme's motion and stays perfectly readable. pointer-events:none so drag/click still
   land on .orb underneath - no interaction JS changes needed. */
.mark{
  position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;
  font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.06em;color:#fff;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,.55), 1px -1px 0 rgba(0,0,0,.55),
    -1px 1px 0 rgba(0,0,0,.55), 1px 1px 0 rgba(0,0,0,.55),
    0 1px 4px rgba(0,0,0,.45);
}
</style>
</head>
<body>

  <div id="bubble" data-state="idle">
    <div class="orb-wrap">
      <div class="ring-track"></div>
      <div class="ring-sweep"></div>
      <div class="mono-ring3d"></div>
      <div class="orb" id="orb">
        <div class="core core-default"><div class="default-fill"></div></div>
        <div class="core core-mono"><div class="mono-blob"></div></div>
        <div class="core core-ice">
          <div class="ice-base"></div><div class="ice-rings"></div><div class="ice-scan"></div><div class="ice-ping"></div>
        </div>
        <div class="core core-mint">
          <div class="mint-cell"></div>
          <div class="mint-buds"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>
        </div>
        <div class="core core-amber">
          <div class="amber-glass"></div>
          <svg class="amber-filament" viewBox="0 0 66 66" preserveAspectRatio="xMidYMid meet">
            <path d="M18 44 L28 22 L24 34 L42 14 L34 32 L48 20" fill="none" stroke="#ffd98a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="core core-rose"><div class="rose-facets"></div></div>
        <div class="core core-violet"><div class="violet-void"></div><div class="violet-disk"></div></div>
      </div>
      <span class="mark" id="orb-mark">B</span>
    </div>
  </div>

<script>
// OS-aware treatment (the orb is solid by design; this future-proofs any translucent bits).
window.bridge.getShellStyle().then(function (s) {
  document.documentElement.dataset.os = (s && s.osVariant) || 'win10';
}).catch(function () { document.documentElement.dataset.os = 'win10'; });
(function(){
  if (window.__miniOverlayBootstrapped) {
    console.warn('[mini-overlay] bootstrap already ran, skipping duplicate initialization');
    return;
  }
  window.__miniOverlayBootstrapped = true;

  const $ = (id) => document.getElementById(id);
  const bridge = window.bridge || {};
  console.log('[mini-overlay] window.bridge exists:', !!window.bridge);

  // Maps index.html's ACCENTS list to one of the six hand-built themes above. Anything not
  // in this list (a future custom color) gets no data-palette, and .core-default covers it.
  const PALETTES = {
    '#e7e9ee': 'mono', '#7fd1ff': 'ice', '#5ad19a': 'mint',
    '#e0b15a': 'amber', '#e9637b': 'rose', '#b08cff': 'violet'
  };

  // ---------- drag to move, click to expand ----------
  try{
    const orb = $('orb');
    const bubbleEl = $('bubble');
    let down=false, moved=0, lastX=0, lastY=0;
    orb.addEventListener('mousedown', function(e){
      down=true; moved=0; lastX=e.screenX; lastY=e.screenY; e.preventDefault();
      bubbleEl.classList.add('grabbing');
    });
    window.addEventListener('mousemove', function(e){
      if(!down) return;
      const dx=e.screenX-lastX, dy=e.screenY-lastY;
      lastX=e.screenX; lastY=e.screenY;
      moved += Math.abs(dx)+Math.abs(dy);
      if(bridge.overlayMoveBy) bridge.overlayMoveBy(dx, dy);
    });
    window.addEventListener('mouseup', function(){
      if(!down) return;
      down=false;
      bubbleEl.classList.remove('grabbing');
      if(moved < 6 && bridge.overlayExpand) bridge.overlayExpand(); // a click, not a drag -> expand
    });
  }catch(e){ console.error('[mini-overlay] drag-to-move setup FAILED:', e); }

  // ---------- drag a document straight onto the bubble to import it ----------
  try{
    const bubbleEl = $('bubble');
    let depth = 0;
    function isFileDrag(e){ return e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types||[], 'Files') !== -1; }
    document.addEventListener('dragenter', function(e){
      if(!isFileDrag(e)) return;
      e.preventDefault(); depth++;
      bubbleEl.classList.add('dragging');
    });
    document.addEventListener('dragover', function(e){ if(isFileDrag(e)) e.preventDefault(); });
    document.addEventListener('dragleave', function(e){
      if(!isFileDrag(e)) return;
      depth = Math.max(0, depth-1);
      if(depth===0) bubbleEl.classList.remove('dragging');
    });
    document.addEventListener('drop', async function(e){
      if(!isFileDrag(e)) return;
      e.preventDefault();
      depth = 0;
      bubbleEl.classList.remove('dragging');
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      if(!file || !bridge.getPathForFile || !bridge.importDocPath) return;
      try{
        const p = bridge.getPathForFile(file);
        if(!p) return;
        await bridge.importDocPath(p);
      }catch(err){ console.error('[mini-overlay] file drop import FAILED:', err); }
    });
  }catch(e){ console.error('[mini-overlay] drag-and-drop setup FAILED:', e); }

  // ---------- reflect Caryl's live status: ring state, name, and accent THEME ----------
  let lastName='', lastAccent='';
  async function refresh(){
    try{
      if(!bridge.status){ console.warn('[mini-overlay] bridge.status is missing - stale preload.js?'); return; }
      const s = await bridge.status();
      if(!s) return;
      let st='idle';
      if(s.ai_status==='thinking') st='thinking';
      else if(s.ai_status==='working'||s.ai_status==='researching') st='working';
      $('bubble').dataset.state = st;
      const nm = s.assistant_name || 'Caryl';
      if(nm!==lastName){ lastName=nm; $('orb-mark').textContent = nm.slice(0,1).toUpperCase(); }
      const ac = (s.accent_color || '#7fd1ff').toLowerCase();
      if(ac!==lastAccent){
        lastAccent=ac;
        document.documentElement.style.setProperty('--accent', ac);
        const pal = PALETTES[ac];
        if(pal) $('bubble').setAttribute('data-palette', pal);
        else $('bubble').removeAttribute('data-palette');
      }
    }catch(e){ console.error('[mini-overlay] bridge.status() FAILED:', e); }
  }
  setInterval(refresh, 220);
  refresh();
})();
</script>
</body>
</html>
