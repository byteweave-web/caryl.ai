<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caryl.ai — Research</title>
<style>
  /* Alias shim (Unified OS): every colour resolves from system-shell.css so this
     research panel is cut from the same glass as the rest of the OS. The old
     bespoke blue-gradient look is retired — the pane now wears the shared .glass
     material (fill + blur + hairline + grain), and links carry the --core accent. */
  :root{
    --glass-density:.28;                 /* a parked read surface: a touch denser than chat for contrast */
    --accent:var(--core);                /* unification: this surface's accent IS the OS core */
    --link:var(--core);
    --txt:var(--ink); --mut:var(--dim); --faint:#66727e;
    --line:var(--hair);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:transparent;overflow:hidden}
  body{
    font-family:var(--read); color:var(--txt);
    -webkit-font-smoothing:antialiased;
    -webkit-user-select:none; user-select:none;
  }

  /* The pane. Material (fill/blur/hairline/grain/shadow) all comes from .glass. */
  .frame{ position:fixed; inset:0; --e:3;
    display:flex; flex-direction:column;
    border-radius:14px; overflow:hidden; }

  .titlebar{
    height:38px; flex:0 0 38px;
    display:flex; align-items:center; gap:10px; padding:0 12px;
    -webkit-app-region:drag;
    border-bottom:1px solid var(--line);
  }
  .titlebar > *{ -webkit-app-region:no-drag; }
  .pip{width:8px;height:8px;border-radius:50%;background:var(--core);
    box-shadow:0 0 12px var(--core);flex:none;animation:pip-breathe 2.6s ease-in-out infinite}
  @keyframes pip-breathe{0%,100%{opacity:1}50%{opacity:.45}}
  @media (prefers-reduced-motion: reduce){ .pip{animation:none} }
  .timetag{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
  .title{margin:0;flex:1;min-width:0;
    font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .iconbtn{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
    background:transparent;color:var(--mut);cursor:pointer;display:grid;place-items:center;
    transition:background .12s,color .12s;font-size:14px;line-height:1;padding:0}
  .iconbtn:hover{background:rgba(255,255,255,.08);color:var(--txt)}
  .iconbtn.pinned{border-color:var(--core);color:var(--core);background:color-mix(in srgb,var(--core) 14%,transparent)}

  .scroll{flex:1;overflow-y:auto;padding:14px 18px 22px}
  .scroll::-webkit-scrollbar{width:8px}
  .scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}
  .scroll::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.28)}

  .meta{margin:0 0 14px}
  .meta .q{color:var(--ink);font-size:13px;line-height:1.5;margin:0}

  .block{margin:8px 0 14px;background:rgba(255,255,255,.03);
    border:1px solid var(--line);border-radius:11px;padding:11px 14px}
  .block h4{margin:0 0 6px;font-family:var(--mono);font-size:10px;font-weight:600;
    letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
  .block p{margin:6px 0;font-size:14px;line-height:1.6;color:var(--ink);white-space:pre-wrap}
  .block ul,.block ol{margin:6px 0 6px 18px;font-size:14px;line-height:1.6;color:var(--ink)}
  .block li{margin:3px 0}
  .block a{color:var(--link);text-decoration:none;border-bottom:1px dotted color-mix(in srgb,var(--core) 45%,transparent)}
  .block a:hover{border-bottom-style:solid}
  .block code{font-family:var(--mono);font-size:11.5px;background:rgba(0,0,0,.28);padding:1px 6px;border-radius:5px;color:#dff0ff}
  .block strong{color:var(--ink)}
  .block em{color:var(--mut)}

  .quote{margin:8px 0;border-left:2px solid var(--core);padding:6px 12px;color:var(--mut);font-style:italic}

  .empty{display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;
    height:100%;text-align:center;color:var(--dim);font-size:13px;line-height:1.7}
  .empty .dot{width:10px;height:10px;border-radius:50%;background:var(--core);
    box-shadow:0 0 14px var(--core);animation:rpulse 1.4s ease-in-out infinite}
  @keyframes rpulse{0%,100%{opacity:.45;transform:scale(.85)}50%{opacity:1;transform:scale(1.18)}}
  @media (prefers-reduced-motion: reduce){ .empty .dot{animation:none} }

  .footer{flex:0 0 auto;padding:8px 14px;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.08em;
    text-align:right;text-transform:uppercase;-webkit-app-region:no-drag}
  .footer .src{color:var(--dim)}
  .footer .err{color:var(--bad)}
</style>
<link rel="stylesheet" href="system-shell.css">
</head>
<body>
<div class="frame glass">
  <div class="titlebar">
    <span class="pip"></span>
    <span class="timetag" id="t-tag">RESEARCH</span>
    <h1 class="title ca" id="t-title">Camera Research</h1>
    <button class="iconbtn" id="btn-pin" title="Pin on top" aria-label="Pin on top"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8"/><path d="M9 6l3-4 3 4"/><path d="M5 10h14l-2 11H7L5 10z"/></svg></button>
    <button class="iconbtn" id="btn-close" title="Close" aria-label="Close">&#x2715;</button>
  </div>
  <div class="scroll" id="scroll">
    <div class="empty" id="empty">
      <div class="dot"></div>
      <div>Ask the assistant to research what's in front of the camera.<br><span style="color:var(--dim);font-size:11px;font-family:var(--mono);letter-spacing:.6px">e.g. “research this thing I’m holding”</span></div>
    </div>
  </div>
  <div class="footer">
    <span class="src" id="f-src">caryl.ai</span>
    &nbsp;&middot;&nbsp;
    <span id="f-stamp">&mdash;</span>
  </div>
</div>
<script>
// OS-aware treatment: Win11 keeps the frosted glass; Win10 gets the shared opaque
// fallback (fail solid, never transparent). Stamped from getShellStyle when present.
try{
  if(window.bridge && typeof window.bridge.getShellStyle === 'function'){
    window.bridge.getShellStyle().then(function(s){
      document.documentElement.dataset.os = (s && s.osVariant) || 'win10';
    }).catch(function(){ document.documentElement.dataset.os = 'win10'; });
  } else { document.documentElement.dataset.os = 'win10'; }
}catch(_e){ document.documentElement.dataset.os = 'win10'; }

// Render payload = metadata + sections (h4 + content). Plain DOM only — no
// script injection from the model — innerHTML on a controlled escaping helper
// reduces a known XSS surface to: any attacker-controlled text that contains
// HTML is rendered as text, never as markup.
const scroll = document.getElementById('scroll');
const tTitle = document.getElementById('t-title');
const tTag   = document.getElementById('t-tag');
const fStamp = document.getElementById('f-stamp');
const fSrc   = document.getElementById('f-src');
const empty  = document.getElementById('empty');
const btnPin   = document.getElementById('btn-pin');
const btnClose = document.getElementById('btn-close');

function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function nl2br(s){ return escapeHtml(s).replace(/\r?\n/g, '<br>'); }
function renderMarkdownLite(s){
  // Conservative converter: **bold**, _italics_, `code`, [text](url), bare http urls.
  // We never run raw HTML - everything is escaped first.
  let html = escapeHtml(s);
  html = html.replace(/`([^`\n]+)`/g, function(_m, c){ return '<code>' + c + '</code>'; });
  html = html.replace(/\*\*([^*\n]+)\*\*/g, function(_m, c){ return '<strong>' + c + '</strong>'; });
  html = html.replace(/_([^_\n]+)_/g, function(_m, c){ return '<em>' + c + '</em>'; });
  html = html.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, function(_m, t, u){ return '<a href="' + u + '" target="_blank" rel="noreferrer">' + t + '</a>'; });
  html = html.replace(/(^|[^"'>])(https?:\/\/[^\s<]+)/g, function(_m, pre, u){ return pre + '<a href="' + u + '" target="_blank" rel="noreferrer">' + u + '</a>'; });
  html = html.replace(/\r?\n/g, '<br>');
  return html;
}

function render(payload){
  if(!payload || typeof payload !== 'object'){ showEmpty(); return; }
  // Defensive: drop anything that doesn't look like our schema.
  const title = String(payload.title || 'Camera Research').slice(0, 120);
  const tag   = String(payload.tag   || 'RESEARCH').slice(0, 24).toUpperCase();
  const source= String(payload.source|| 'caryl.ai').slice(0, 50);
  const ts    = String(payload.timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })).slice(0, 30);
  const sections = Array.isArray(payload.sections) ? payload.sections : [];
  tTitle.textContent = title;
  tTag.textContent   = tag;
  fSrc.textContent   = source;
  fStamp.textContent = ts;
  if(!sections.length){ showEmpty(); return; }
  let out = '';
  if(payload.question){
    out += '<div class="meta"><div class="q">' + renderMarkdownLite(payload.question) + '</div></div>';
  }
  sections.slice(0, 50).forEach(function(s){
    if(!s || typeof s !== 'object') return;
    const heading = String(s.heading || '').slice(0, 80);
    const body    = String(s.body || '').slice(0, 8000);
    const items   = Array.isArray(s.items) ? s.items : [];
    if(!heading && !body && !items.length) return;
    out += '<div class="block">';
    if(heading) out += '<h4>' + escapeHtml(heading) + '</h4>';
    if(body)    out += '<p>' + renderMarkdownLite(body) + '</p>';
    if(items.length){
      out += '<ul>';
      items.slice(0, 30).forEach(function(it){ out += '<li>' + renderMarkdownLite(String(it).slice(0, 600)) + '</li>'; });
      out += '</ul>';
    }
    out += '</div>';
  });
  if(!out){ showEmpty(); return; }
  scroll.innerHTML = out;
  scroll.scrollTop = 0;
}

function showEmpty(){
  scroll.innerHTML = '';
  scroll.appendChild(empty);
}

// Initial payload (set BEFORE loadURL via win's bridge, so the window never
// shows the empty state when there's a real research result).
function tryBridge(){
  try{
    if(!window.bridge || typeof window.bridge.getResearchPayload !== 'function'){
      showEmpty();
      return;
    }
    window.bridge.getResearchPayload().then(function(p){
      if(p){ render(p); }
      else { showEmpty(); }
    }).catch(function(){ showEmpty(); });
  }catch(_e){ showEmpty(); }
}

btnClose.addEventListener('click', function(){
  try{ if(window.bridge && window.bridge.closeResearchOverlay) window.bridge.closeResearchOverlay(); }catch(_e){}
});
btnPin.addEventListener('click', function(){
  const on = !btnPin.classList.contains('pinned');
  btnPin.classList.toggle('pinned', on);
  try{ if(window.bridge && window.bridge.setResearchPin) window.bridge.setResearchPin(on); }catch(_e){}
});
// Listen for live updates (same renderer can be re-targeted with new content).
try{
  if(window.bridge && window.bridge.onResearchUpdate){
    window.bridge.onResearchUpdate(function(p){
      if(p && p.kind === 'clear'){ showEmpty(); return; }
      render(p);
    });
  }
}catch(_e){}

// Esc closes the overlay.
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    try{ if(window.bridge && window.bridge.closeResearchOverlay) window.bridge.closeResearchOverlay(); }catch(_e){}
  }
});

tryBridge();
</script>
</body>
</html>
